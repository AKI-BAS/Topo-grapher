<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>topo-grapher / admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Nacelle:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root, [data-theme="dark"] {
  --bg: #080C08; --surface: #0E120C; --surface2: #151A12;
  --border: #1E2418; --border2: #2A3220;
  --text: #EFE3D8; --muted: #6B665A; --text-mid: #A8A08E;
  --accent: #9ABA6A; --accent2: #6A8A4A; --accent-dk: #1A2410;
  --green: #3A5E2A; --green-lt: #5A8E3A;
  --blue: #4EA0D9; --blue-dk: #1A2E3E;
  --amber: #E0A050; --amber-dk: #2E2010;
  --red: #E25555;
  --purple: #8B7AC6;
  --grid: rgba(30,38,24,0.35);
  --kpi-text: #fff;
  --topbar-bg: rgba(8,12,8,.92);
  --dock-bg: rgba(14,18,12,.85);
  --win-header: rgba(14,18,12,.95);
  --win-shadow: 0 8px 32px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.3);
  --win-shadow-active: 0 12px 48px rgba(0,0,0,.6), 0 4px 12px rgba(0,0,0,.4);
}
[data-theme="light"] {
  --bg: #F4F1EC; --surface: #FFFFFF; --surface2: #EDE9E3;
  --border: #D8D2C8; --border2: #C4BCB0;
  --text: #1A1A18; --muted: #8A857A; --text-mid: #5A564E;
  --accent: #4A7A2A; --accent2: #3A6A1A; --accent-dk: #E8F0DE;
  --green: #3A7A2A; --green-lt: #2A6A1A;
  --blue: #2878C8; --blue-dk: #E0EEF8;
  --amber: #B87A20; --amber-dk: #F8EED8;
  --red: #CC3333;
  --purple: #6A5AA6;
  --grid: rgba(200,195,185,0.3);
  --kpi-text: #1A1A18;
  --topbar-bg: rgba(244,241,236,.92);
  --dock-bg: rgba(255,255,255,.85);
  --win-header: rgba(255,255,255,.95);
  --win-shadow: 0 8px 32px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.08);
  --win-shadow-active: 0 12px 48px rgba(0,0,0,.18), 0 4px 12px rgba(0,0,0,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Nacelle',sans-serif;min-height:100vh;overflow:hidden;}
code,pre,.mono{font-family:'DM Mono',monospace;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

/* ── Login ─────────────────────────────────────────────────── */
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--bg);}
.login-box{width:380px;border:1px solid var(--border2);background:var(--surface);padding:40px;position:relative;animation:fadeIn .6s ease;}
.login-box::before{content:'';position:absolute;top:-1px;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.login-logo{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);letter-spacing:.08em;margin-bottom:6px;}
.login-logo em{color:var(--muted);font-style:normal;}
.login-title{font-size:22px;font-weight:500;color:var(--text);margin-bottom:28px;}
.login-field{margin-bottom:14px;}
.login-field label{display:block;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
.login-field input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color .2s;border-radius:0;}
.login-field input:focus{border-color:var(--accent2);}
.login-btn{width:100%;margin-top:8px;padding:12px;background:var(--green);color:#EFE3D8;border:1px solid var(--green-lt);font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;letter-spacing:.06em;transition:background .2s;}
.login-btn:hover{background:var(--green-lt);}
.login-error{font-family:'DM Mono',monospace;font-size:12px;color:var(--red);margin-top:12px;min-height:16px;}

/* ── Topbar ────────────────────────────────────────────────── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:48px;border-bottom:1px solid var(--border);background:var(--topbar-bg);backdrop-filter:blur(10px);position:fixed;top:0;left:0;right:0;z-index:200;}
.topbar-left{display:flex;align-items:center;gap:16px;}
.topbar-logo{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);letter-spacing:.06em;}
.topbar-logo em{color:var(--muted);font-style:normal;}
.topbar-slash{color:var(--border2);font-size:16px;}
.topbar-page{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
.topbar-right{display:flex;align-items:center;gap:18px;}
.live-badge{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:.06em;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite;}
.topbar-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.topbar-user{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-mid);}
.logout-btn{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);background:none;border:1px solid var(--border);padding:4px 10px;cursor:pointer;letter-spacing:.04em;transition:all .2s;}
.logout-btn:hover{color:var(--red);border-color:var(--red);}

/* ── Dock (bottom bar with window toggles) ─────────────────── */
.dock{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:4px;padding:6px 10px;background:var(--dock-bg);backdrop-filter:blur(16px);border:1px solid var(--border2);border-radius:14px;z-index:200;box-shadow:0 4px 24px rgba(0,0,0,.3);}
.dock-btn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.04em;color:var(--muted);background:none;border:1px solid transparent;padding:6px 12px;cursor:pointer;transition:all .15s;border-radius:8px;white-space:nowrap;display:flex;align-items:center;gap:6px;user-select:none;}
.dock-btn:hover{color:var(--text-mid);background:var(--surface2);}
.dock-btn.active{color:var(--accent);border-color:var(--accent2);background:var(--accent-dk);}
.dock-btn .dock-icon{font-size:13px;line-height:1;}
.dock-sep{width:1px;height:22px;background:var(--border2);align-self:center;margin:0 2px;}

/* ── Canvas (window workspace) ─────────────────────────────── */
.canvas{position:fixed;top:48px;left:0;right:0;bottom:0;overflow:auto;z-index:1;}

/* ── Window panels ─────────────────────────────────────────── */
.win{position:absolute;background:var(--surface);border:1px solid var(--border);box-shadow:var(--win-shadow);display:flex;flex-direction:column;transition:box-shadow .2s, opacity .15s, transform .15s;min-width:280px;min-height:180px;border-radius:8px;overflow:hidden;}
.win.dragging{box-shadow:var(--win-shadow-active);opacity:.92;z-index:100!important;cursor:grabbing;}
.win.entering{animation:winEnter .25s ease-out;}
.win.exiting{animation:winExit .15s ease-in forwards;}
.win-header{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:34px;background:var(--win-header);border-bottom:1px solid var(--border);cursor:grab;flex-shrink:0;user-select:none;-webkit-user-select:none;}
.win-header:active{cursor:grabbing;}
.win-dots{display:flex;gap:6px;align-items:center;}
.win-dot{width:10px;height:10px;border-radius:50%;cursor:pointer;transition:opacity .15s;border:none;padding:0;display:flex;align-items:center;justify-content:center;font-size:7px;color:transparent;}
.win-dot:hover{color:rgba(0,0,0,.6);}
.win-dot.close{background:#FF5F57;}
.win-dot.minimize{background:#FFBD2E;}
.win-dot.zoom{background:#28C840;}
.win-title{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;position:absolute;left:50%;transform:translateX(-50%);pointer-events:none;}
.win-badge{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.04em;background:var(--surface2);border:1px solid var(--border);padding:2px 7px;border-radius:4px;}
.win-body{flex:1;overflow:auto;padding:16px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.win-body::-webkit-scrollbar{width:4px;} .win-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── Resize handle ─────────────────────────────────────────── */
.win-resize{position:absolute;bottom:0;right:0;width:16px;height:16px;cursor:nwse-resize;z-index:5;}
.win-resize::after{content:'';position:absolute;bottom:3px;right:3px;width:8px;height:8px;border-right:2px solid var(--border2);border-bottom:2px solid var(--border2);border-radius:0 0 2px 0;opacity:.5;transition:opacity .15s;}
.win-resize:hover::after{opacity:1;}

/* ── KPIs ──────────────────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.kpi{background:var(--surface2);border:1px solid var(--border);padding:14px;position:relative;overflow:hidden;transition:border-color .2s;border-radius:4px;}
.kpi:hover{border-color:var(--border2);}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--kpi-color,var(--accent));opacity:.4;}
.kpi-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;}
.kpi-value{font-size:22px;font-weight:500;color:var(--kpi-text);line-height:1;margin-bottom:4px;}
.kpi-delta{font-family:'DM Mono',monospace;font-size:10px;}
.delta-up{color:var(--accent);} .delta-down{color:var(--red);}

/* ── Badges ────────────────────────────────────────────────── */
.badge{display:inline-block;font-size:9px;padding:2px 7px;font-family:'DM Mono',monospace;letter-spacing:.04em;border-radius:3px;}
.badge-lidar{background:var(--blue-dk);color:var(--blue);border:1px solid rgba(78,160,217,.3);}
.badge-good{background:var(--accent-dk);color:var(--accent);border:1px solid rgba(154,186,106,.3);}
.badge-mid{background:var(--amber-dk);color:var(--amber);border:1px solid rgba(224,160,80,.3);}
.badge-low{background:#2a1a10;color:#f09975;border:1px solid rgba(216,90,48,.3);}

/* ── Bar chart ─────────────────────────────────────────────── */
.bar-chart-h{display:flex;flex-direction:column;gap:5px;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-label{width:44px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text-mid);text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:18px;background:var(--surface2);overflow:hidden;position:relative;border-radius:2px;}
.bar-fill{height:100%;transition:width .6s cubic-bezier(.16,1,.3,1);}
.bar-fill-accent{background:linear-gradient(90deg,var(--green),var(--accent));}
.bar-fill-blue{background:linear-gradient(90deg,#1a4a6a,var(--blue));}
.bar-fill-amber{background:linear-gradient(90deg,#4a3010,var(--amber));}
.bar-fill-red{background:linear-gradient(90deg,#3a1010,var(--red));}
.bar-fill-purple{background:linear-gradient(90deg,#2a1a3a,var(--purple));}
.bar-value{width:40px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;}

/* ── SVG charts ────────────────────────────────────────────── */
.chart-area{height:160px;position:relative;overflow:hidden;}
.chart-area svg{width:100%;height:100%;}

/* ── Heatmap ───────────────────────────────────────────────── */
.heatmap-wrap{width:100%;flex:1;min-height:0;overflow:hidden;border:1px solid var(--border);border-radius:4px;}
.heatmap-wrap .leaflet-container{background:var(--bg)!important;}
/* Make heatmap window body flexbox so map fills it */
#body-heatmap{display:flex;flex-direction:column;}
.heatmap-legend{display:flex;gap:12px;margin-top:10px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);flex-wrap:wrap;flex-shrink:0;}
.heatmap-legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:4px;}

/* ── Funnel ────────────────────────────────────────────────── */
.funnel{display:flex;flex-direction:column;gap:6px;}
.funnel-step{position:relative;}
.funnel-label{display:flex;justify-content:space-between;margin-bottom:3px;}
.funnel-name{font-family:'DM Mono',monospace;font-size:10px;color:var(--text);letter-spacing:.04em;}
.funnel-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.funnel-bar-bg{height:5px;background:var(--surface2);border:1px solid var(--border);overflow:hidden;border-radius:2px;}
.funnel-bar-fill{height:100%;transition:width 1s cubic-bezier(.16,1,.3,1);}
.funnel-pct{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:1px;text-align:right;}

/* ── Donut ─────────────────────────────────────────────────── */
.donut-wrap{display:flex;align-items:center;gap:24px;}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:8px;}
.donut-legend-item{display:flex;align-items:center;justify-content:space-between;}
.donut-legend-left{display:flex;align-items:center;gap:8px;}
.donut-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.donut-legend-label{font-size:11px;color:var(--text);}
.donut-legend-val{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}

/* ── Data gap table ────────────────────────────────────────── */
.gap-table{width:100%;border-collapse:collapse;}
.gap-table th{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;text-align:left;padding:0 0 8px 0;border-bottom:1px solid var(--border);}
.gap-table td{padding:7px 0;border-bottom:1px solid rgba(30,36,24,.5);font-size:12px;vertical-align:middle;}
.gap-table tr:last-child td{border-bottom:none;}
.gap-rank{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);width:22px;}
.gap-flag{font-size:14px;width:26px;}
.gap-country{font-weight:500;color:var(--text);}
.gap-demand{text-align:right;}
.demand-bar-wrap{width:50px;height:4px;background:var(--surface2);overflow:hidden;display:inline-block;vertical-align:middle;margin-right:5px;border-radius:2px;}
.demand-bar-fill{height:100%;background:var(--amber);}
.res-tag{font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;letter-spacing:.04em;text-transform:uppercase;border-radius:3px;}
.res-poor{background:rgba(226,85,85,.12);color:var(--red);border:1px solid rgba(226,85,85,.25);}
.res-med{background:rgba(224,160,80,.12);color:var(--amber);border:1px solid rgba(224,160,80,.25);}
.res-good{background:rgba(154,186,106,.12);color:var(--accent);border:1px solid rgba(154,186,106,.25);}

/* ── Live feed ─────────────────────────────────────────────── */
.feed{display:flex;flex-direction:column;gap:0;max-height:100%;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.feed::-webkit-scrollbar{width:3px;} .feed::-webkit-scrollbar-thumb{background:var(--border2);}
.feed-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(30,36,24,.5);animation:slideIn .3s ease;}
.feed-type{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;border:1px solid var(--border);flex-shrink:0;border-radius:4px;}
.feed-type-gen{color:var(--muted);background:var(--surface2);}
.feed-type-pro{color:var(--blue);background:var(--blue-dk);border-color:rgba(78,160,217,.3);}
.feed-type-signup{color:var(--accent);background:var(--accent-dk);border-color:rgba(154,186,106,.3);}
.feed-type-upgrade{color:var(--amber);background:var(--amber-dk);border-color:rgba(224,160,80,.3);}
.feed-content{flex:1;min-width:0;}
.feed-main{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.feed-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:1px;}
.feed-time{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);flex-shrink:0;margin-top:3px;}

/* ── Animations ────────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes winEnter{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes winExit{to{opacity:0;transform:scale(.95)}}

/* ── Theme toggle in topbar ────────────────────────────────── */
.theme-toggle{display:flex;align-items:center;gap:0;border:1px solid var(--border);overflow:hidden;cursor:pointer;border-radius:6px;}
.theme-toggle-opt{font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;color:var(--muted);background:none;border:none;cursor:pointer;transition:all .15s;letter-spacing:.02em;}
.theme-toggle-opt.active{color:var(--accent);background:var(--accent-dk);}

/* ── Layout preset buttons ─────────────────────────────────── */
.layout-btn{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);background:none;border:1px solid var(--border);padding:4px 10px;cursor:pointer;letter-spacing:.04em;transition:all .15s;border-radius:6px;}
.layout-btn:hover{color:var(--text-mid);border-color:var(--border2);}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Topo<em>-grapher</em></div>
    <div class="login-title">Admin Dashboard</div>
    <form onsubmit="event.preventDefault();doLogin();">
      <div class="login-field"><label>Email</label><input type="email" id="login-email" placeholder="you@topo-grapher.com" autocomplete="username"></div>
      <div class="login-field"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"></div>
      <button type="submit" class="login-btn">Authenticate →</button>
    </form>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div id="dashboard" style="display:none;">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">Topo<em>-grapher</em></span>
      <span class="topbar-slash">/</span>
      <span class="topbar-page">Command</span>
    </div>
    <div class="topbar-right">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <span class="topbar-time" id="clock">--:--:--</span>
      <span class="topbar-user" id="admin-email"></span>
      <button class="layout-btn" onclick="resetLayout()" title="Reset all windows to default grid positions">⊞ Reset layout</button>
      <div class="theme-toggle" id="theme-toggle">
        <button class="theme-toggle-opt active" data-theme="dark" onclick="setAdminTheme('dark')">☾</button>
        <button class="theme-toggle-opt" data-theme="light" onclick="setAdminTheme('light')">☀</button>
      </div>
      <button class="logout-btn" onclick="doSignOut()">Sign out</button>
    </div>
  </div>

  <!-- Canvas for free-form windows -->
  <div class="canvas" id="canvas"></div>

  <!-- Dock -->
  <div class="dock" id="dock"></div>
</div>

// Window registry — defines all panels
const WIN_DEFS = [
  { id: 'kpis',      title: 'KPIs',           icon: '◈', w: 620, h: 260 },
  { id: 'heatmap',   title: 'Heatmap',        icon: '◎', w: 560, h: 420 },
  { id: 'revenue',   title: 'Revenue',        icon: '£', w: 460, h: 380 },
  { id: 'trends',    title: 'Trends',         icon: '⟋', w: 520, h: 440 },
  { id: 'funnel',    title: 'Funnel',         icon: '▽', w: 380, h: 340 },
  { id: 'gaps',      title: 'LiDAR Priority', icon: '⊿', w: 380, h: 340 },
  { id: 'users',     title: 'Users',          icon: '◉', w: 340, h: 280 },
  { id: 'countries', title: 'Countries',      icon: '⚑', w: 340, h: 300 },
  { id: 'feed',      title: 'Live Feed',      icon: '◇', w: 400, h: 420 },
];

let _zIndex = 10;
let _winState = {}; // id → {x,y,w,h,visible,zIndex}
let _winEls = {};   // id → DOM element

function getDefaultLayout() {
  const GAP = 12;
  const canvas = document.getElementById('canvas');
  const cw = (canvas ? canvas.clientWidth : window.innerWidth) - GAP * 2;
  const ch = (canvas ? canvas.clientHeight : window.innerHeight - 48) - GAP * 2;
  const state = {};

  // 3-column responsive grid — columns sized proportionally
  const c1w = Math.round(cw * 0.38);
  const c2w = Math.round(cw * 0.32);
  const c3w = cw - c1w - c2w - GAP * 2;
  const cols = [GAP, GAP + c1w + GAP, GAP + c1w + GAP + c2w + GAP];
  const colWidths = [c1w, c2w, c3w];

  // Row layout: each col gets specific windows with proportional heights
  const colMap = [
    // col 0: KPIs (short) + Trends (tall)
    [{ id:'kpis', hFrac: 0.30 }, { id:'trends', hFrac: 0.70 }],
    // col 1: Heatmap (tall) + Funnel
    [{ id:'heatmap', hFrac: 0.55 }, { id:'funnel', hFrac: 0.45 }],
    // col 2: Revenue + LiDAR gaps + Users + Countries + Feed
    [{ id:'revenue', hFrac: 0.28 }, { id:'gaps', hFrac: 0.22 }, { id:'users', hFrac: 0.18 }, { id:'countries', hFrac: 0.16 }, { id:'feed', hFrac: 0.16 }],
  ];

  colMap.forEach((entries, col) => {
    // Total available height minus gaps between windows
    const totalGaps = (entries.length - 1) * GAP;
    const availH = ch - totalGaps;
    let y = GAP;
    entries.forEach(entry => {
      const h = Math.round(availH * entry.hFrac);
      state[entry.id] = { x: cols[col], y, w: colWidths[col], h, visible: true, zIndex: _zIndex++ };
      y += h + GAP;
    });
  });

  return state;
}

function saveLayout() {
  try { localStorage.setItem('topo-admin-layout', JSON.stringify(_winState)); } catch(e) {}
}
function loadLayout() {
  try {
    const s = localStorage.getItem('topo-admin-layout');
    if (s) { _winState = JSON.parse(s); return true; }
  } catch(e) {}
  return false;
}

function resetLayout() {
  _winState = getDefaultLayout();
  _preZoom = {}; // Clear any zoom memory
  saveLayout();
  // Animate windows back into place
  WIN_DEFS.forEach(def => {
    const el = _winEls[def.id];
    const st = _winState[def.id];
    if (!el || !st) return;
    el.style.transition = 'left .3s ease, top .3s ease, width .3s ease, height .3s ease';
    el.style.left = st.x + 'px';
    el.style.top = st.y + 'px';
    el.style.width = st.w + 'px';
    el.style.height = st.h + 'px';
    el.style.zIndex = st.zIndex;
    el.style.display = st.visible ? 'flex' : 'none';
    el.classList.remove('exiting');
    setTimeout(() => { el.style.transition = ''; }, 350);
    const db = document.querySelector(`.dock-btn[data-win="${def.id}"]`);
    if (db) db.classList.toggle('active', st.visible);
  });
  if (_hmap) setTimeout(() => _hmap.invalidateSize(), 350);
  setTimeout(() => loadTrendsChart(), 350);
}

function createWindow(def) {
  const st = _winState[def.id];
  const el = document.createElement('div');
  el.className = 'win entering';
  el.dataset.winId = def.id;
  el.style.cssText = `left:${st.x}px;top:${st.y}px;width:${st.w}px;height:${st.h}px;z-index:${st.zIndex};display:${st.visible?'flex':'none'};`;

  el.innerHTML = `
    <div class="win-header">
      <div class="win-dots">
        <button class="win-dot close" onclick="toggleWin('${def.id}',false)" title="Close">×</button>
        <button class="win-dot minimize" onclick="toggleWin('${def.id}',false)" title="Minimize">−</button>
        <button class="win-dot zoom" onclick="zoomWin('${def.id}')" title="Zoom">+</button>
      </div>
      <span class="win-title">${def.title}</span>
      <span class="win-badge" id="badge-${def.id}"></span>
    </div>
    <div class="win-body" id="body-${def.id}"></div>
    <div class="win-resize" data-win="${def.id}"></div>
  `;

  // Remove enter animation class after it plays
  el.addEventListener('animationend', () => el.classList.remove('entering'), { once: true });

  // Focus on click
  el.addEventListener('mousedown', () => bringToFront(def.id));

  document.getElementById('canvas').appendChild(el);
  _winEls[def.id] = el;

  // Setup drag on header
  setupDrag(el, el.querySelector('.win-header'), def.id);
  // Setup resize
  setupResize(el, el.querySelector('.win-resize'), def.id);
}

function bringToFront(id) {
  _zIndex++;
  const el = _winEls[id];
  if (el) el.style.zIndex = _zIndex;
  _winState[id].zIndex = _zIndex;
}

function toggleWin(id, show) {
  const el = _winEls[id];
  const st = _winState[id];
  if (!el || !st) return;

  if (show === undefined) show = !st.visible;
  st.visible = show;

  if (show) {
    el.style.display = 'flex';
    el.classList.remove('exiting');
    el.classList.add('entering');
    bringToFront(id);
    // Refresh heatmap if it's the map window
    if (id === 'heatmap' && _hmap) setTimeout(() => _hmap.invalidateSize(), 300);
  } else {
    el.classList.add('exiting');
    setTimeout(() => { el.style.display = 'none'; el.classList.remove('exiting'); }, 150);
  }

  // Update dock button
  const db = document.querySelector(`.dock-btn[data-win="${id}"]`);
  if (db) db.classList.toggle('active', show);
  saveLayout();
}

let _preZoom = {}; // id → {x,y,w,h} saved before zoom

function zoomWin(id) {
  const el = _winEls[id];
  const st = _winState[id];
  if (!el || !st) return;

  const canvas = document.getElementById('canvas');
  const cw = canvas.clientWidth - 24;
  const ch = canvas.clientHeight - 24;

  // If already zoomed, restore to pre-zoom position
  if (_preZoom[id]) {
    const pz = _preZoom[id];
    st.x = pz.x; st.y = pz.y; st.w = pz.w; st.h = pz.h;
    delete _preZoom[id];
  } else {
    // Save current position before zooming
    _preZoom[id] = { x: st.x, y: st.y, w: st.w, h: st.h };
    st.x = 12; st.y = 12; st.w = cw; st.h = ch;
  }

  el.style.transition = 'left .2s ease, top .2s ease, width .2s ease, height .2s ease';
  el.style.left = st.x + 'px'; el.style.top = st.y + 'px';
  el.style.width = st.w + 'px'; el.style.height = st.h + 'px';
  setTimeout(() => { el.style.transition = ''; }, 250);
  bringToFront(id);
  saveLayout();
  if (id === 'heatmap' && _hmap) setTimeout(() => _hmap.invalidateSize(), 300);
  if (id === 'trends') setTimeout(() => loadTrendsChart(), 250);
}

// ── Drag ──────────────────────────────────────────────────────
function setupDrag(el, handle, id) {
  let ox, oy, sx, sy;
  handle.addEventListener('mousedown', e => {
    if (e.target.classList.contains('win-dot')) return;
    e.preventDefault();
    el.classList.add('dragging');
    ox = e.clientX; oy = e.clientY;
    sx = _winState[id].x; sy = _winState[id].y;
    const onMove = e2 => {
      const nx = sx + (e2.clientX - ox);
      const ny = sy + (e2.clientY - oy);
      _winState[id].x = nx; _winState[id].y = ny;
      el.style.left = nx + 'px'; el.style.top = ny + 'px';
    };
    const onUp = () => {
      el.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      saveLayout();
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// ── Resize ────────────────────────────────────────────────────
function setupResize(el, handle, id) {
  handle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    el.classList.add('dragging');
    const ox = e.clientX, oy = e.clientY;
    const sw = _winState[id].w, sh = _winState[id].h;
    let _rafResize = null;
    const onMove = e2 => {
      const nw = Math.max(280, sw + (e2.clientX - ox));
      const nh = Math.max(180, sh + (e2.clientY - oy));
      _winState[id].w = nw; _winState[id].h = nh;
      el.style.width = nw + 'px'; el.style.height = nh + 'px';
      // Live-update map size during resize
      if (id === 'heatmap' && _hmap && !_rafResize) {
        _rafResize = requestAnimationFrame(() => { _hmap.invalidateSize(); _rafResize = null; });
      }
    };
    const onUp = () => {
      el.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      saveLayout();
      if (id === 'heatmap' && _hmap) setTimeout(() => _hmap.invalidateSize(), 50);
      if (id === 'trends') setTimeout(() => loadTrendsChart(), 100);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// ── Build dock ────────────────────────────────────────────────
function buildDock() {
  const dock = document.getElementById('dock');
  dock.innerHTML = WIN_DEFS.map((d, i) => {
    const active = _winState[d.id]?.visible ? ' active' : '';
    const sep = i === 3 || i === 6 ? '<div class="dock-sep"></div>' : '';
    return `${sep}<button class="dock-btn${active}" data-win="${d.id}" onclick="toggleWin('${d.id}')" title="${d.title}"><span class="dock-icon">${d.icon}</span>${d.title}</button>`;
  }).join('');
}

// ── Helpers ───────────────────────────────────────────────────
function ago(ts){const m=Math.round((Date.now()-new Date(ts).getTime())/60000);if(m<1)return'just now';if(m<60)return m+'m ago';const h=Math.round(m/60);if(h<24)return h+'h ago';const d=Math.round(h/24);return d<30?d+'d ago':Math.round(d/30)+'mo ago';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function barRow(label,value,max,cls='bar-fill-accent'){const p=max>0?Math.max(2,value/max*100):0;return`<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-track"><div class="bar-fill ${cls}" style="width:${p}%"></div></div><div class="bar-value">${value}</div></div>`;}

function buildSVG(id,labels,values,color='#9ABA6A',fill='rgba(154,186,106,.1)'){
  const el=document.getElementById(id);if(!el)return;
  const W=el.clientWidth||500,H=el.clientHeight||160;
  const pad={top:8,right:8,bottom:22,left:36};
  const cW=W-pad.left-pad.right,cH=H-pad.top-pad.bottom;
  const mx=Math.max(...values,1),n=values.length;
  if(!n){el.innerHTML='<div class="mono" style="color:var(--muted);font-size:11px;">No data</div>';return;}
  const xS=cW/Math.max(n-1,1);
  const pts=values.map((v,i)=>({x:pad.left+i*xS,y:pad.top+cH-(v/mx)*cH}));
  const line=pts.map((p,i)=>`${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const area=line+` L${pts[n-1].x.toFixed(1)},${pad.top+cH} L${pts[0].x.toFixed(1)},${pad.top+cH} Z`;
  const yL=[0,Math.round(mx/2),mx].map(v=>`<text x="${pad.left-4}" y="${pad.top+cH-(v/mx)*cH+3}" text-anchor="end" fill="var(--muted)" font-family="DM Mono,monospace" font-size="9">${v}</text>`);
  const yG=[0,.25,.5,.75,1].map(f=>`<line x1="${pad.left}" y1="${pad.top+cH*(1-f)}" x2="${W-pad.right}" y2="${pad.top+cH*(1-f)}" stroke="var(--border)" stroke-width=".5"/>`);
  const every=Math.max(1,Math.floor(n/6));
  const xL=labels.map((l,i)=>(i%every&&i!==n-1)?'':`<text x="${pts[i].x.toFixed(1)}" y="${H-3}" text-anchor="middle" fill="var(--muted)" font-family="DM Mono,monospace" font-size="9">${l}</text>`).join('');
  const dots=pts.map((p,i)=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.5" fill="${color}" opacity=".8"><title>${labels[i]}: ${values[i]}</title></circle>`).join('');
  el.innerHTML=`<svg viewBox="0 0 ${W} ${H}">${yG.join('')}${yL.join('')}<path d="${area}" fill="${fill}"/><path d="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>${dots}${xL}</svg>`;
}

// ── KPIs ──────────────────────────────────────────────────────
async function loadKPIs(){
  const{count:totalGens}=await _sb.from('generations').select('*',{count:'exact',head:true});
  const weekAgo=new Date(Date.now()-7*864e5).toISOString();
  const prevWeekAgo=new Date(Date.now()-14*864e5).toISOString();
  const{count:weekGens}=await _sb.from('generations').select('*',{count:'exact',head:true}).gte('created_at',weekAgo);
  const{count:prevWeekGens}=await _sb.from('generations').select('*',{count:'exact',head:true}).gte('created_at',prevWeekAgo).lt('created_at',weekAgo);
  const{data:uids}=await _sb.from('generations').select('user_id').limit(10000);
  const activeUsers=new Set((uids||[]).map(r=>r.user_id)).size;
  const{count:proCount}=await _sb.from('profiles').select('*',{count:'exact',head:true}).in('plan',['pro','company']).eq('is_admin',false);
  const{count:totalUsers}=await _sb.from('profiles').select('*',{count:'exact',head:true});
  const{data:resAll}=await _sb.from('generations').select('resolution_m').not('resolution_m','is',null).limit(10000);
  const avgRes=resAll&&resAll.length?Math.round(resAll.reduce((s,r)=>s+r.resolution_m,0)/resAll.length*10)/10:null;
  const weekDelta=prevWeekGens>0?Math.round((weekGens-prevWeekGens)/prevWeekGens*100):0;
  const{data:compProf}=await _sb.from('profiles').select('seat_count').eq('plan','company').eq('is_company_admin',true).eq('is_admin',false);
  const compSeats=(compProf||[]).reduce((s,p)=>s+(p.seat_count||0),0);
  const mrr=(proCount||0)*39.99+compSeats*29.99;

  document.getElementById('body-kpis').innerHTML=`<div class="kpi-grid">
    <div class="kpi" style="--kpi-color:var(--accent)"><div class="kpi-label">MRR</div><div class="kpi-value" style="color:var(--accent)">£${mrr.toFixed(0)}</div><div class="kpi-delta">${proCount||0} Pro + ${compSeats} seats</div></div>
    <div class="kpi" style="--kpi-color:var(--blue)"><div class="kpi-label">Gens / week</div><div class="kpi-value" style="color:var(--blue)">${weekGens||0}</div><div class="kpi-delta ${weekDelta>=0?'delta-up':'delta-down'}">${weekDelta>=0?'↑':'↓'} ${Math.abs(weekDelta)}% vs prev</div></div>
    <div class="kpi" style="--kpi-color:var(--accent)"><div class="kpi-label">Active users</div><div class="kpi-value">${activeUsers}</div><div class="kpi-delta">${totalUsers||0} total signups</div></div>
    <div class="kpi" style="--kpi-color:var(--purple)"><div class="kpi-label">Pro subs</div><div class="kpi-value" style="color:var(--purple)">${proCount||0}</div><div class="kpi-delta">${totalUsers?Math.round((proCount||0)/totalUsers*100):0}% conversion</div></div>
    <div class="kpi" style="--kpi-color:${avgRes&&avgRes>15?'var(--amber)':'var(--accent)'}"><div class="kpi-label">Avg resolution</div><div class="kpi-value">${avgRes?avgRes+'m':'—'}</div><div class="kpi-delta">${avgRes&&avgRes>30?'↓ needs more LiDAR':'data quality'}</div></div>
    <div class="kpi" style="--kpi-color:var(--accent)"><div class="kpi-label">Total gens</div><div class="kpi-value">${(totalGens||0).toLocaleString()}</div><div class="kpi-delta">all time</div></div>
  </div>`;
}

// ── Heatmap ───────────────────────────────────────────────────
let _hmap=null;
async function loadHeatmap(){
  const body = document.getElementById('body-heatmap');
  body.innerHTML = `<div class="heatmap-wrap" id="heatmap-container"></div>
    <div class="heatmap-legend">
      <span><span class="heatmap-legend-dot" style="background:#4EA0D9"></span>LiDAR ≤1m</span>
      <span><span class="heatmap-legend-dot" style="background:#9ABA6A"></span>10m</span>
      <span><span class="heatmap-legend-dot" style="background:#E0A050"></span>30m</span>
      <span><span class="heatmap-legend-dot" style="background:#E25555"></span>90m</span>
      <span><span class="heatmap-legend-dot" style="background:#666"></span>Unknown</span>
    </div>`;

  const{data}=await _sb.from('generations').select('centroid_lat,centroid_lon,resolution_m,country_code,project_name,created_at').not('centroid_lat','is',null).not('centroid_lon','is',null).order('created_at',{ascending:false}).limit(5000);
  if(!data||!data.length){document.getElementById('heatmap-container').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;font-family:DM Mono,monospace;font-size:12px;color:var(--muted);">No location data yet</div>';return;}
  document.getElementById('badge-heatmap').textContent=data.length+' sites';

  const theme = document.documentElement.getAttribute('data-theme') || 'dark';
  const tileUrl = theme === 'light'
    ? 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';

  if(!_hmap){_hmap=L.map('heatmap-container',{center:[52,10],zoom:4,zoomControl:true,attributionControl:false,maxBounds:[[-85,-180],[85,180]],maxBoundsViscosity:1.0,minZoom:2});L.tileLayer(tileUrl,{maxZoom:18,noWrap:true}).addTo(_hmap);}
  if(_hmap._mg)_hmap.removeLayer(_hmap._mg);
  const mg=L.layerGroup();_hmap._mg=mg;
  const bounds=[];
  data.forEach(r=>{const lat=+r.centroid_lat,lon=+r.centroid_lon;if(!isFinite(lat)||!isFinite(lon))return;bounds.push([lat,lon]);const c=r.resolution_m==null?'#666':r.resolution_m<=1?'#4EA0D9':r.resolution_m<=10?'#9ABA6A':r.resolution_m<=30?'#E0A050':'#E25555';mg.addLayer(L.circleMarker([lat,lon],{radius:6,fillColor:c,color:c,weight:1,opacity:.8,fillOpacity:.5}).bindPopup(`<div style="font-family:DM Mono,monospace;font-size:11px;line-height:1.7;"><strong>${esc(r.project_name||'—')}</strong><br>${CF[r.country_code]||''} ${CN[r.country_code]||r.country_code||'??'}<br>${r.resolution_m!=null?r.resolution_m+'m':'Unknown'}<br><span style="opacity:.6">${ago(r.created_at)}</span></div>`));});
  mg.addTo(_hmap);
  if(bounds.length)_hmap.fitBounds(bounds,{padding:[20,20],maxZoom:6});
  setTimeout(()=>_hmap.invalidateSize(),400);
}

// ── Revenue ───────────────────────────────────────────────────

  const proMRR=(proCount||0)*39.99,compMRR=compSeats*29.99,totalMRR=proMRR+compMRR;
  const{data:addons}=await _sb.from('generations').select('addon_charged_pence,project_name,area_km2,created_at').gt('addon_charged_pence',0).order('created_at',{ascending:false}).limit(20);
  const totalAddon=(addons||[]).reduce((s,r)=>s+(r.addon_charged_pence||0),0);

  document.getElementById('badge-revenue').textContent='MRR + Add-ons';
  document.getElementById('body-revenue').innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;">
      <div style="text-align:center;"><div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:3px;">TOTAL MRR</div><div style="font-size:20px;font-weight:500;color:var(--accent);">£${totalMRR.toFixed(0)}</div></div>
      <div style="text-align:center;"><div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:3px;">PRO</div><div style="font-size:20px;font-weight:500;color:var(--blue);">£${proMRR.toFixed(0)}</div></div>
      <div style="text-align:center;"><div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:3px;">COMPANY</div><div style="font-size:20px;font-weight:500;color:var(--amber);">£${compMRR.toFixed(0)}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
      <div style="text-align:center;"><div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:3px;">ADD-ONS</div><div style="font-size:20px;font-weight:500;color:var(--purple);">£${(totalAddon/100).toFixed(0)}</div></div>
      <div style="text-align:center;"><div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:3px;">ARR (PROJ)</div><div style="font-size:20px;font-weight:500;color:var(--accent);">£${Math.round(totalMRR*12).toLocaleString()}</div></div>
    </div>
    <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);">Addon charges</div>
    <div style="max-height:200px;overflow-y:auto;">
      ${(addons||[]).length?addons.map(r=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:11px;"><span style="color:var(--text-mid);">${esc(r.project_name||'—')} · ${r.area_km2?r.area_km2.toFixed(1)+'km²':'—'}</span><span style="color:var(--purple);">£${(r.addon_charged_pence/100).toFixed(2)}</span></div>`).join(''):'<div style="font-family:DM Mono,monospace;font-size:11px;color:var(--muted);">No addon charges yet</div>'}
    </div>`;
}

// ── Trends ────────────────────────────────────────────────────
let _trendData = null;
async function loadTrends(){
  const ago30=new Date(Date.now()-30*864e5).toISOString();
  const{data}=await _sb.from('generations').select('created_at,user_plan').gte('created_at',ago30).order('created_at',{ascending:true}).limit(10000);
  _trendData = data;
  if(!data||!data.length) return;

  document.getElementById('badge-trends').textContent='30 days';
  const today=new Date().toISOString().slice(0,10);
  const todayC=data.filter(r=>r.created_at.slice(0,10)===today).length;
  const wk=new Date(Date.now()-7*864e5).toISOString();
  const weekC=data.filter(r=>r.created_at>=wk).length;

  const dc={};data.forEach(r=>{const d=r.created_at.slice(0,10);dc[d]=(dc[d]||0)+1;});
  const days=[];for(let i=29;i>=0;i--){days.push(new Date(Date.now()-i*864e5).toISOString().slice(0,10));}

  const hc=new Array(24).fill(0);data.forEach(r=>{hc[new Date(r.created_at).getUTCHours()]++;});
  const mh=Math.max(...hc,1);

  document.getElementById('body-trends').innerHTML=`
    <div style="display:flex;gap:16px;margin-bottom:12px;">
      <div style="text-align:center;flex:1;"><div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:3px;">TODAY</div><div style="font-size:18px;font-weight:500;color:var(--accent);">${todayC}</div></div>
      <div style="text-align:center;flex:1;"><div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:3px;">THIS WEEK</div><div style="font-size:18px;font-weight:500;color:var(--blue);">${weekC}</div></div>
      <div style="text-align:center;flex:1;"><div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:3px;">DAILY AVG</div><div style="font-size:18px;font-weight:500;color:var(--text);">${(data.length/30).toFixed(1)}</div></div>
    </div>
    <div class="chart-area" id="trend-chart"></div>
    <div style="margin-top:12px;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);">By hour (UTC)</div>
    <div class="bar-chart-h">${[0,3,6,9,12,15,18,21].map(h=>barRow(String(h).padStart(2,'0')+':00',hc[h],mh,'bar-fill-accent')).join('')}</div>
  `;
  requestAnimationFrame(()=>buildSVG('trend-chart',days.map(d=>d.slice(5)),days.map(d=>dc[d]||0)));
}

function loadTrendsChart() {
  if (!_trendData) return;
  const dc={};_trendData.forEach(r=>{const d=r.created_at.slice(0,10);dc[d]=(dc[d]||0)+1;});
  const days=[];for(let i=29;i>=0;i--){days.push(new Date(Date.now()-i*864e5).toISOString().slice(0,10));}
  requestAnimationFrame(()=>buildSVG('trend-chart',days.map(d=>d.slice(5)),days.map(d=>dc[d]||0)));
}

// ── Funnel ────────────────────────────────────────────────────
async function loadFunnel(){
  const{count:totalSignups}=await _sb.from('profiles').select('*',{count:'exact',head:true});
  const{data:genUsers}=await _sb.from('generations').select('user_id').limit(10000);
  const uniqueGenUsers=new Set((genUsers||[]).map(r=>r.user_id)).size;
  const userGenCount={};(genUsers||[]).forEach(r=>{userGenCount[r.user_id]=(userGenCount[r.user_id]||0)+1;});
  const returnUsers=Object.values(userGenCount).filter(c=>c>=2).length;
  const{count:proUsers}=await _sb.from('profiles').select('*',{count:'exact',head:true}).in('plan',['pro','company']).eq('is_admin',false);
  const{data:proGenUsers}=await _sb.from('generations').select('user_id,user_plan').in('user_plan',['pro','company']).limit(10000);
  const proGenCount={};(proGenUsers||[]).forEach(r=>{proGenCount[r.user_id]=(proGenCount[r.user_id]||0)+1;});
  const repeatPro=Object.values(proGenCount).filter(c=>c>=2).length;

  const steps=[
    {name:'Signups',count:totalSignups||0,color:'var(--accent)'},
    {name:'First generation',count:uniqueGenUsers,color:'var(--blue)'},
    {name:'Return visit (2+ gens)',count:returnUsers,color:'#6A8AD9'},
    {name:'Pro/Company upgrade',count:proUsers||0,color:'var(--purple)'},
    {name:'Repeat Pro usage',count:repeatPro,color:'var(--amber)'},
  ];
  const maxC=steps[0].count||1;
  document.getElementById('badge-funnel').textContent='All time';
  document.getElementById('body-funnel').innerHTML=`<div class="funnel">${steps.map(s=>{
    const pct=maxC>0?Math.round(s.count/maxC*100):0;
    return`<div class="funnel-step"><div class="funnel-label"><span class="funnel-name">${s.name}</span><span class="funnel-count">${s.count.toLocaleString()}</span></div><div class="funnel-bar-bg"><div class="funnel-bar-fill" style="width:0%;background:${s.color}" data-w="${pct}"></div></div><div class="funnel-pct">${pct}%</div></div>`;
  }).join('')}</div>`;
  requestAnimationFrame(()=>{document.querySelectorAll('.funnel-bar-fill').forEach(el=>{setTimeout(()=>{el.style.width=el.dataset.w+'%';},100);});});
}

// ── Gap table ─────────────────────────────────────────────────
async function loadGapTable(){
  const{data}=await _sb.from('generations').select('country_code,resolution_m,user_id').not('country_code','is',null).limit(10000);
  if(!data||!data.length){document.getElementById('body-gaps').innerHTML='<div style="color:var(--muted);font-family:DM Mono,monospace;font-size:11px;">No data</div>';return;}
  const cc={};data.forEach(r=>{const c=r.country_code;if(!cc[c])cc[c]={gens:0,users:new Set(),res:[]};cc[c].gens++;cc[c].users.add(r.user_id);if(r.resolution_m!=null)cc[c].res.push(r.resolution_m);});
  const maxG=Math.max(...Object.values(cc).map(d=>d.gens),1);
  const pri=Object.entries(cc).map(([code,d])=>{
    const avgR=d.res.length?d.res.reduce((a,b)=>a+b,0)/d.res.length:90;
    const best=BEST_RES[code]||null;
    const demandScore=d.gens/maxG*100;
    const gapScore=best?Math.log10(avgR/best+1):Math.log10(avgR+1);
    return{code,gens:d.gens,avgR,best,demandScore,score:demandScore/100*gapScore};
  }).sort((a,b)=>b.score-a.score).slice(0,8);

  document.getElementById('badge-gaps').textContent='Demand × Gap';
  document.getElementById('body-gaps').innerHTML=`<table class="gap-table"><thead><tr><th>#</th><th></th><th>Country</th><th>Demand</th><th>Res.</th></tr></thead><tbody>${pri.map((p,i)=>{
    const resClass=p.avgR>30?'res-poor':p.avgR>10?'res-med':'res-good';
    const resLabel=p.avgR<=1?'LiDAR':p.avgR<=10?p.avgR.toFixed(0)+'m':p.avgR<=30?'30m DEM':'SRTM 90m';
    return`<tr><td class="gap-rank">${String(i+1).padStart(2,'0')}</td><td class="gap-flag">${CF[p.code]||'🌍'}</td><td class="gap-country">${CN[p.code]||p.code}</td><td class="gap-demand"><span class="demand-bar-wrap"><div class="demand-bar-fill" style="width:${p.demandScore}%"></div></span></td><td><span class="res-tag ${resClass}">${resLabel}</span></td></tr>`;
  }).join('')}</tbody></table>`;
}

// ── Donut ──────────────────────────────────────────────────────
async function loadDonut(){
  const{data:profiles}=await _sb.from('profiles').select('plan').limit(10000);
  if(!profiles)return;
  const counts={free:0,pro:0,company:0};
  profiles.forEach(p=>{counts[p.plan]=(counts[p.plan]||0)+1;});
  const total=profiles.length;
  document.getElementById('badge-users').textContent=total+' users';
  const plans=[
    {name:'Free',count:counts.free,color:'var(--border2)'},
    {name:'Pro',count:counts.pro,color:'var(--blue)'},
    {name:'Company',count:counts.company,color:'var(--purple)'},
  ];
  const cx=65,cy=65,r=48,stroke=18,circ=2*Math.PI*r;
  let offset=0;
  let svgInner='';
  let legendInner='';
  plans.forEach(p=>{
    const pct=total>0?p.count/total*100:0;
    const dash=pct/100*circ,gap=circ-dash;
    svgInner+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${p.color}" stroke-width="${stroke}" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset*circ/100}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset+=pct;
    legendInner+=`<div class="donut-legend-item"><div class="donut-legend-left"><div class="donut-dot" style="background:${p.color}"></div><span class="donut-legend-label">${p.name}</span></div><span class="donut-legend-val">${p.count} · ${pct.toFixed(1)}%</span></div>`;
  });
  svgInner+=`<text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="18" font-weight="500" fill="var(--text)" font-family="Nacelle,sans-serif">${total}</text>`;
  svgInner+=`<text x="${cx}" y="${cy+10}" text-anchor="middle" font-size="8" fill="var(--muted)" font-family="DM Mono,monospace">USERS</text>`;

  document.getElementById('body-users').innerHTML=`<div class="donut-wrap"><svg width="130" height="130" viewBox="0 0 130 130">${svgInner}</svg><div class="donut-legend">${legendInner}</div></div>`;
}

// ── Country bars ──────────────────────────────────────────────
async function loadCountryBars(){

// ── Live feed ─────────────────────────────────────────────────
async function loadFeed(){
  const{data:gens}=await _sb.from('generations').select('project_name,country_code,resolution_m,user_plan,point_count,spacing,area_km2,created_at').order('created_at',{ascending:false}).limit(30);
  const{data:signups}=await _sb.from('profiles').select('email,plan,created_at').order('created_at',{ascending:false}).limit(10);
  const items=[];
  (gens||[]).forEach(r=>items.push({type:r.user_plan==='pro'||r.user_plan==='company'?'pro':'gen',time:r.created_at,main:`${CF[r.country_code]||'🌍'} ${esc(r.project_name||'—')}`,meta:`${r.user_plan||'free'} · ${r.point_count?r.point_count.toLocaleString()+'pts':''} · ${r.resolution_m!=null?r.resolution_m+'m':'??'}${r.area_km2?' · '+r.area_km2.toFixed(2)+'km²':''}`}));
  (signups||[]).forEach(r=>items.push({type:r.plan!=='free'?'upgrade':'signup',time:r.created_at,main:`New ${r.plan!=='free'?r.plan+' subscriber':'signup'} · ${esc((r.email||'').split('@')[0])}`,meta:r.plan!=='free'?r.plan+' tier':'free tier'}));
  items.sort((a,b)=>new Date(b.time)-new Date(a.time));
  const icons={gen:'◇',pro:'⬡',signup:'★',upgrade:'↑'};
  const typeClasses={gen:'feed-type-gen',pro:'feed-type-pro',signup:'feed-type-signup',upgrade:'feed-type-upgrade'};

  document.getElementById('badge-feed').textContent='Live tail';
  document.getElementById('body-feed').innerHTML=`<div class="feed">${items.slice(0,20).map(i=>`<div class="feed-item"><div class="feed-type ${typeClasses[i.type]}">${icons[i.type]}</div><div class="feed-content"><div class="feed-main">${i.main}</div><div class="feed-meta">${i.meta}</div></div><div class="feed-time">${ago(i.time)}</div></div>`).join('')||'<div class="mono" style="color:var(--muted);font-size:11px;">No activity yet</div>'}</div>`;
}

// AUTH & INIT
// ══════════════════════════════════════════════════════════════

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-error');
  err.textContent='';
  if(!email||!pass){err.textContent='Fill in both fields.';return;}
  const{data,error}=await _sb.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent=error.message;return;}
  const{data:isAdmin}=await _sb.rpc('is_current_user_admin');
  if(!isAdmin){err.textContent='Access denied — not an admin account.';await _sb.auth.signOut();return;}
  showDashboard(data.session);
}
async function checkSession(){
  const{data:{session}}=await _sb.auth.getSession();
  if(!session)return;
  const{data:isAdmin}=await _sb.rpc('is_current_user_admin');
  if(!isAdmin)return;
  showDashboard(session);
}
function showDashboard(session){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('admin-email').textContent=session.user.email;
  initWindows();
  loadAll();
}
async function doSignOut(){await _sb.auth.signOut();location.reload();}

function updateClock(){document.getElementById('clock').textContent=new Date().toUTCString().slice(17,25)+' UTC';}
setInterval(updateClock,1000);

const LAYOUT_VERSION = 2; // Bump to invalidate old localStorage layouts

function initWindows() {
  // Check layout version — invalidate old formats
  const savedVersion = parseInt(localStorage.getItem('topo-admin-layout-v') || '0');
  if (savedVersion < LAYOUT_VERSION || !loadLayout()) {
    _winState = getDefaultLayout();
  }
  localStorage.setItem('topo-admin-layout-v', LAYOUT_VERSION);
  // Ensure all windows exist in state (in case new ones were added)
  const defaults = getDefaultLayout();
  WIN_DEFS.forEach(def => {
    if (!_winState[def.id]) _winState[def.id] = defaults[def.id];
  });
  // Create window elements
  WIN_DEFS.forEach(def => createWindow(def));
  // Build dock
  buildDock();
  saveLayout();
}

// Re-tile on browser window resize (debounced)
let _resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    if (_hmap) _hmap.invalidateSize();
  }, 200);
});

async function loadAll(){
  updateClock();
  await Promise.all([loadKPIs(),loadHeatmap(),loadRevenue(),loadTrends(),loadFunnel(),loadGapTable(),loadDonut(),loadCountryBars(),loadFeed()]);
  setInterval(loadFeed, 30000);
}

checkSession();
</script>
